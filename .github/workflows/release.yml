# https://github.com/electron/fiddle/blob/main/.github/workflows/release.yml

name: Release

#on:
#    push:
#        tags:
#            - 'v*'

on:
    workflow_dispatch: # This enables the manual trigger
    push: # This is an automatic deployment on every push to the branch
        branches: [ "main" ]

permissions: {}

jobs:
    build:
        name: Build
        strategy:
            fail-fast: false
            matrix:
#                os: [ubuntu-latest, windows-latest, macos-latest]
#                arch: [x64, arm64]
                os: [windows-latest]
                arch: [x64]
                exclude:
                    - os: windows-latest
                      arch: arm64
        runs-on: "${{ matrix.os }}"
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'
            - run: npm install
            - name: Build and Publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#                  APPLE_ID: ${{ secrets.APPLE_ID }}
#                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
              run: npm run publish -- --arch=${{ matrix.arch }}
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: build-artifacts-${{ matrix.os }}-${{ matrix.arch }}
                  path: out
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ startsWith(matrix.os, 'ubuntu-') && matrix.arch == 'x64' }}
              with:
                  name: webpack-source-maps
                  path: .webpack
                  include-hidden-files: true
